---
# tasks to setup a single user on a host.
# Called with loop_var: base_user (one entry from base_users list in main.yaml)
#
# inputs (via base_user dict):
#   - base_user.name: username
#   - base_user.password_prehashed: prehashed password
#   - base_user.shell: login shell (optional, default: /usr/bin/zsh)
#   - base_user.groups: list of groups (optional, default: [sudo])
#   - base_user.add_ssh_keys: add secret_ssh_keys to authorized_keys (optional, default: false)

- name: Create user {{ base_user.name }}
  ansible.builtin.user:
    name: "{{ base_user.name }}"
    password: "{{ base_user.password_prehashed }}"
    update_password: on_create
    createhome: true
    home: "/home/{{ base_user.name }}"
    shell: "{{ base_user.shell | default('/usr/bin/zsh') }}"
    groups: "{{ base_user.groups | default(['sudo']) }}"
    append: true
    state: present
    generate_ssh_key: true
    ssh_key_type: ed25519
  become: true
  tags:
    - base
    - base.user

- name: Add public SSH keys to {{ base_user.name }}
  ansible.posix.authorized_key:
    user: "{{ base_user.name }}"
    state: present
    key: "{{ item.key }}"
    comment: "{{ item.name }}"
  loop: "{{ secret_ssh_keys[base_user.name] | default([]) }}"
  loop_control:
    label: "{{ item.name }}"
  when: base_user.add_ssh_keys | default(false) is true
  tags:
    - base
    - base.user
