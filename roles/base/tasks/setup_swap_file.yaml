---
# Tasks to setup a swap file
#
# inputs:
#   - base_swap_file.size: size of the swap file
#   - base_swap_file.path: path to the swap file

# Check if the swap file exists
- name: Check if the swap file exists
  ansible.builtin.stat:
    path: "{{ base_swap_file.path }}"
  register: base_swapfile_stat

# Block to create the swap file if it does not exist
- name: Block to create the swap file if it does not exist
  when: not base_swapfile_stat.stat.exists
  block:
    # Create the swap file if it does not exist
    - name: Create the swap file
      ansible.builtin.command: >
        fallocate -l {{ base_swap_file.size }} "{{ base_swap_file.path }}"
      changed_when: true
      become: true

    # Set the swap file permissions
    - name: Set the swap file permissions
      ansible.builtin.file:
        path: "{{ base_swap_file.path }}"
        mode: '0600'
      become: true

    # Format the swap file
    - name: Format the swap file
      ansible.builtin.command: >
        mkswap "{{ base_swap_file.path }}"
      changed_when: true
      become: true

    # Enable the swap file
    - name: Enable the swap file
      ansible.builtin.command: >
        swapon "{{ base_swap_file.path }}"
      changed_when: true
      become: true

    # Add the swap file to /etc/fstab
    - name: Add the swap file to /etc/fstab
      ansible.posix.mount:
        src: "{{ base_swap_file.path }}"
        path: "{{ base_swap_file.path }}"
        fstype: swap
        opts: sw
        state: present
      become: true
