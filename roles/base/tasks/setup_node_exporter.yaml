---
# Configure prometheus-node-exporter options

- name: Configure prometheus-node-exporter defaults
  ansible.builtin.template:
    src: node_exporter_defaults.j2
    dest: /etc/default/prometheus-node-exporter
    owner: root
    group: root
    mode: '0644'
  become: true
  notify: Restart prometheus-node-exporter
  tags:
    - base
    - base.node_exporter
