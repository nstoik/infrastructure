---
# tasks to setup dotfiles for a single user.
# Called from setup_user.yaml when base_user.dotfiles.install is true.
#
# inputs (via base_user dict):
#   - base_user.name: username to install dotfiles for
#   - base_user.dotfiles.install: boolean
#   - base_user.dotfiles.profile: dotbot profile (default: server)
#   - base_user.dotfiles.repo: git repo URL (default: base_dotfiles_repo)
#   - base_user.dotfiles.dir: local clone path (default: /home/<user>/dotfiles)

- name: Block for base dotfiles tasks
  tags:
    - base
    - base.dotfiles
  vars:
    dotfiles_user: "{{ base_user.name }}"
    dotfiles_dir: "{{ base_user.dotfiles.dir | default('/home/' + base_user.name + '/dotfiles') }}"
    dotfiles_repo: "{{ base_user.dotfiles.repo | default(base_dotfiles_repo) }}"
    dotfiles_profile: "{{ base_user.dotfiles.profile | default('server') }}"
  block:
    - name: Install ZSH and ACL
      ansible.builtin.package:
        name:
          - zsh
          - acl
        state: present
      become: true

    - name: Make the directory for the dotfiles
      ansible.builtin.file:
        path: "{{ dotfiles_dir }}"
        state: directory
        owner: "{{ dotfiles_user }}"
        group: "{{ dotfiles_user }}"
        mode: "0700"
      become: true

    - name: Clone the dotfiles repository  # noqa: latest
      ansible.builtin.git:
        repo: "{{ dotfiles_repo }}"
        dest: "{{ dotfiles_dir }}"
        recursive: true
        update: true
        force: true
      become: true
      become_user: "{{ dotfiles_user }}"

    - name: Set the git config option filemode to false in the .git/config file
      ansible.builtin.lineinfile:
        path: "{{ dotfiles_dir }}/.git/config"
        regexp: "^\\s*filemode\\s*=\\s*true"
        line: "filemode = false"
        state: present
      become: true

    - name: Make the install script executable
      ansible.builtin.file:
        path: "{{ dotfiles_dir }}/install-profile"
        mode: "0700"
      become: true

    - name: Check if authorized_keys is a regular file
      ansible.builtin.stat:
        path: "/home/{{ dotfiles_user }}/.ssh/authorized_keys"
      register: _authorized_keys_stat
      become: true

    - name: Remove authorized_keys if it is a regular file so dotfiles can symlink it
      ansible.builtin.file:
        path: "/home/{{ dotfiles_user }}/.ssh/authorized_keys"
        state: absent
      become: true
      when: _authorized_keys_stat.stat.exists and not _authorized_keys_stat.stat.islnk

    - name: "Run the install script with profile: {{ dotfiles_profile }}"
      ansible.builtin.command: "{{ dotfiles_dir }}/install-profile {{ dotfiles_profile }}"
      args:
        chdir: "{{ dotfiles_dir }}"
      register: base_dotfiles_install_result
      changed_when: "'Creating link' in base_dotfiles_install_result.stdout"
      failed_when: base_dotfiles_install_result.rc != 0
      become: true
      become_user: "{{ dotfiles_user }}"

    - name: Source the .zshrc file the first time to perform the initial setup
      ansible.builtin.shell: "source /home/{{ dotfiles_user }}/.zshrc"
      args:
        chdir: "/home/{{ dotfiles_user }}"
        executable: /usr/bin/zsh
      register: base_zsh_result
      changed_when: base_zsh_result.stdout != "\u001b]0;~\u0007"
      failed_when: base_zsh_result.rc != 0
      become: true
      become_user: "{{ dotfiles_user }}"
