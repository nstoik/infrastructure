---
# defaults file for base

# whether to update and upgrade apt packages or not
# can be "dist", "full", "no", "safe", "yes"
# if "no" is set, then just apt update is run
base_apt_upgrade_packages: "yes"

# whether to update apt packages or not
base_apt_update_packages: true

# variables for rebooting the host
base_reboot_host_if_required: true

# Architecture strings used in GitHub release URLs.
# gping uses arm64 for aarch64; trippy uses the native architecture name.
base_gping_arch: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'x86_64' }}"
base_trippy_arch: "{{ ansible_facts['architecture'] }}"

# GitHub-released binaries to install on all hosts.
# Each entry requires:
#   name: used for the URL marker file
#   url: download URL (may reference base_gping_arch / base_trippy_arch)
#   dest: final binary path (checked on each run; reinstall triggered if missing)
#   archive_binary: path to the binary inside the extracted archive
base_github_binaries:
  - name: gping
    url: "https://github.com/orf/gping/releases/download/gping-v1.20.1/gping-Linux-musl-{{ base_gping_arch }}.tar.gz"
    dest: /usr/local/bin/gping
    archive_binary: gping
    capabilities: cap_net_raw+ep
  - name: trippy
    url: "https://github.com/fujiapple852/trippy/releases/download/0.13.0/trippy-0.13.0-{{ base_trippy_arch }}-unknown-linux-musl.tar.gz"
    dest: /usr/local/bin/trip
    archive_binary: "trippy-0.13.0-{{ base_trippy_arch }}-unknown-linux-musl/trip"
    capabilities: cap_net_raw+ep

# the base packages to install
base_packages:
  - git
  - inxi
  - jq
  - libcap2-bin  # required by community.general.capabilities to set/get binary capabilities (e.g. cap_net_raw for gping/trippy)
  - neofetch
  - vnstat

# the base services to enable and start
# eg format will include the service name, state, and optional enabled state
# base_services:
#   - name: "service_name"
#     state: "started"
#     enabled: true
#   - name: "service_name"
#     state: "stopped"
#     enabled: false
base_services: []

# the user on the Ansible control node (local machine)
# eg. used for the known_hosts_ansible_file variable to specify the path to the known_hosts file on the Ansible control node
base_controller_user: "nelson"

# the base settings for user setup
base_user_run_setup: true

# list of users to create on the host.
# each entry supports:
#   name (required), password_prehashed (required, prehashed),
#   shell (optional, default: /usr/bin/zsh),
#   groups (optional, default: [sudo]),
#   add_ssh_keys (optional, default: false — dotfiles method is preferred)
base_users:
  - name: "{{ default_user }}"
    password_prehashed: "{{ secret_user_password_prehashed }}"
    shell: /usr/bin/zsh
    groups:
      - sudo
    add_ssh_keys: false

# default dotfiles repo used as fallback when base_users[].dotfiles.repo is not set
base_dotfiles_repo: https://github.com/nstoik/dotfiles

# variables for docker
# whether to install docker or not
# the rest of the docker setup is specified in the docker role
base_docker_install: false

# variables for postfix
base_postfix:
  install: false
  relayhost: ""
  relayhost_username: ""
  relayhost_password: ""

# variables for timezone
base_timezone: "America/Edmonton"

# variables for netplan
# base_netplan:
#   configure: true
#   name: /etc/netplan/51-ansible-netcfg.yaml
#   ethernets:
#     - name: "eth0"
#       dhcp4: true
#       optional: false
#       match:
#         macaddress: "xx:xx:xx:xx:xx:xx"  # optional: match by MAC for deterministic naming
#       set_name: "eth0"                    # optional: rename interface
#   wifis:
#     - name: "wlan0"
#       dhcp4: true
#       optional: false
#       access-points:
#         - ssid: "MySSID"
#           password: "MyPassword"
base_netplan:
  configure: false

base_journald:
  Storage: "auto"
  SystemMaxUse: "2G"
  SystemKeepFree: "500M"
  SystemMaxFileSize: "100M"
  SystemMaxFiles: "20"

# Whether to enable the ZFS collector for prometheus-node-exporter
base_node_exporter_zfs_collector: false

# Override the default mount-points exclusion for prometheus-node-exporter
# Default removes /mnt exclusion (to expose ZFS datasets) and adds /export exclusion (to avoid NFS re-export duplicates)
base_node_exporter_mount_points_exclude: '^/(dev|proc|run|sys|media|export|var/lib/docker/.+|var/lib/containers/storage/.+)($|/)'

# Directory for prometheus-node-exporter textfile collector
# Scripts write .prom files here; node_exporter reads them
base_node_exporter_textfile_dir: /var/lib/prometheus/node-exporter
