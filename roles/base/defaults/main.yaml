---
# defaults file for base

# whether to update and upgrade apt packages or not
# can be "dist", "full", "no", "safe", "yes"
# if "no" is set, then just apt update is run
base_apt_upgrade_packages: "yes"

# whether to update apt packages or not
base_apt_update_packages: true

# variables for rebooting the host
base_reboot_host_if_required: true

# the base packages to install
base_packages:
  - git
  - jq
  - neofetch
  - vnstat
  - wireguard
  - wireguard-tools

# the base services to enable and start
# eg format will include the service name, state, and optional enabled state
# base_services:
#   - name: "service_name"
#     state: "started"
#     enabled: true
#   - name: "service_name"
#     state: "stopped"
#     enabled: false
base_services: []

# the user on the Ansible control node (local machine)
# eg. used for the known_hosts_ansible_file variable to specify the path to the known_hosts file on the Ansible control node
base_controller_user: "nelson"

# the base settings for user setup
base_user_run_setup: true

base_user_default: "{{ default_user }}"
base_user_password_default: "{{ secret_user_password }}"
base_user_password_prehashed: "{{ secret_user_password_prehashed }}"

# whether to add ssh keys to the user or not
# defaults to false because generally the ssh keys
# are added using the dotfiles method.
base_user_add_ssh_keys: false

base_user_shell: /usr/bin/zsh

base_user_groups:
  - sudo

# variables for the dotfiles
base_dotfiles_dir: /home/{{ default_user }}/dotfiles
base_dotfiles_repo: https://github.com/nstoik/dotfiles

base_dotfiles:
  install: false
  profile: server

# variables for docker
# whether to install docker or not
# the rest of the docker setup is specified in the docker role
base_docker_install: false

# variables for postfix
base_postfix:
  install: false
  relayhost: ""
  relayhost_username: ""
  relayhost_password: ""

# variables for timezone
base_timezone: "America/Edmonton"

# variables for netplan
# base_netplan:
#   configure: true
#   name: /etc/netplan/51-ansible-netcfg.yaml
#   ethernets:
#     - name: "eth0"
#       dhcp4: true
#       optional: false
#   wifis:
#     - name: "wlan0"
#       dhcp4: true
#       optional: false
#       access-points:
#         - ssid: "MySSID"
#           password: "MyPassword"
base_netplan:
  configure: false

base_journald:
  Storage: "auto"
  SystemMaxUse: "2G"
  SystemKeepFree: "500M"
  SystemMaxFileSize: "100M"
  SystemMaxFiles: "20"

# Whether to enable the ZFS collector for prometheus-node-exporter
base_node_exporter_zfs_collector: false

# Override the default mount-points exclusion for prometheus-node-exporter
# Default removes /mnt exclusion (to expose ZFS datasets) and adds /export exclusion (to avoid NFS re-export duplicates)
base_node_exporter_mount_points_exclude: '^/(dev|proc|run|sys|media|export|var/lib/docker/.+|var/lib/containers/storage/.+)($|/)'

# Directory for prometheus-node-exporter textfile collector
# Scripts write .prom files here; node_exporter reads them
base_node_exporter_textfile_dir: /var/lib/prometheus/node-exporter
