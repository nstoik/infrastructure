---
# Deploy ZFS encryption key metrics for Prometheus textfile collector
# Tracks keystatus for all encrypted datasets — alerts when a key is unavailable

- name: Deploy ZFS key metrics script
  ansible.builtin.template:
    src: zfs_key_metrics.sh.j2
    dest: /usr/local/bin/zfs_key_metrics.sh
    owner: root
    group: root
    mode: '0755'
  become: true
  tags:
    - fileserver
    - fileserver.zfs

- name: Deploy ZFS key metrics systemd service
  ansible.builtin.template:
    src: zfs_key_metrics.service.j2
    dest: /etc/systemd/system/zfs-key-metrics.service
    owner: root
    group: root
    mode: '0644'
  become: true
  tags:
    - fileserver
    - fileserver.zfs

- name: Deploy ZFS key metrics systemd timer
  ansible.builtin.template:
    src: zfs_key_metrics.timer.j2
    dest: /etc/systemd/system/zfs-key-metrics.timer
    owner: root
    group: root
    mode: '0644'
  become: true
  tags:
    - fileserver
    - fileserver.zfs

- name: Enable and start ZFS key metrics timer
  ansible.builtin.systemd:
    name: zfs-key-metrics.timer
    state: started
    enabled: true
    daemon_reload: true
  become: true
  ignore_errors: "{{ ansible_check_mode }}"
  tags:
    - fileserver
    - fileserver.zfs
