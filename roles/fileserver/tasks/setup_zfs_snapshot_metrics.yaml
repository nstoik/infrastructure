---
# Deploy ZFS snapshot metrics for Prometheus textfile collector
# Tracks sanoid/syncoid snapshot counts and ages per dataset

- name: Ensure node_exporter textfile directory exists
  ansible.builtin.file:
    path: "{{ base_node_exporter_textfile_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true
  tags:
    - fileserver
    - fileserver.zfs

- name: Deploy ZFS snapshot metrics script
  ansible.builtin.template:
    src: zfs_snapshot_metrics.sh.j2
    dest: /usr/local/bin/zfs_snapshot_metrics.sh
    owner: root
    group: root
    mode: '0755'
  become: true
  tags:
    - fileserver
    - fileserver.zfs

- name: Deploy ZFS snapshot metrics systemd service
  ansible.builtin.template:
    src: zfs_snapshot_metrics.service.j2
    dest: /etc/systemd/system/zfs-snapshot-metrics.service
    owner: root
    group: root
    mode: '0644'
  become: true
  tags:
    - fileserver
    - fileserver.zfs

- name: Deploy ZFS snapshot metrics systemd timer
  ansible.builtin.template:
    src: zfs_snapshot_metrics.timer.j2
    dest: /etc/systemd/system/zfs-snapshot-metrics.timer
    owner: root
    group: root
    mode: '0644'
  become: true
  tags:
    - fileserver
    - fileserver.zfs

- name: Enable and start ZFS snapshot metrics timer
  ansible.builtin.systemd:
    name: zfs-snapshot-metrics.timer
    state: started
    enabled: true
    daemon_reload: true
  become: true
  ignore_errors: "{{ ansible_check_mode }}"
  tags:
    - fileserver
    - fileserver.zfs
