---
# Host variables for video.internal.welca.ca
# VM provisioning config lives in proxmox_vms/hosts.yaml

ansible_host: 10.150.1.6

base_additional_packages:
  - nmap
  - ffmpeg
  - qemu-guest-agent

# Configure the passed-through Intel I210 NIC (nic0 on PVE host, PCI 0000:02:00.0).
# Matched by MAC address for deterministic interface naming.
base_netplan:
  configure: true
  ethernets:
    - name: camera
      dhcp4: true
      optional: true
      match:
        macaddress: "00:1e:67:df:ae:f2"
      set_name: camera

# ZFS mirror pool using the two 3TB passthrough disks.
# Two 3TB WD Purple drives passed through from the Proxmox host.
sanoid_setup: true

sanoid_datasets:
  - name: video/config
    template: production

fileserver_setup: true
fileserver_setup_zfs: true
fileserver_setup_swap_file: true

fileserver_swap_file:
  path: /swapfile
  size: 4G

fileserver_zfs_pools:
  - pool_name: video
    mount_point: none
    vdevs:
      - raid_type: mirror
        disks:
          - name: scsi-0QEMU_QEMU_HARDDISK_drive-scsi1
          - name: scsi-0QEMU_QEMU_HARDDISK_drive-scsi2
    datasets:
      - name: video/recordings
        mount_point: /mnt/zfs/video/recordings
        quota: 2T
        canmount: "on"
        encryption: false
        recordsize: 1M  # optimised for large sequential video writes
      - name: video/config
        mount_point: /mnt/zfs/video/config
        quota: 100G
        canmount: "on"
        encryption: false
