---
# group_vars for the all group (client_welca inventory)
ansible_become_password: "{{ secret_become_pass }}"

# Default user values
default_user: "welca"
ansible_user: "{{ default_user }}"
default_user_email: "nstoik@stechsolutions.ca"
# secret_user_password is set in vaults/client_welca/vault.yaml

# timezone
base_timezone: "America/Edmonton"

base_controller_user: "nelson"
known_hosts_ansible_file: "/home/{{ base_controller_user }}/.ssh/known_hosts_ansible"

base_users:
  - name: "{{ default_user }}"
    password_prehashed: "{{ secret_user_password_prehashed }}"
    shell: /bin/bash
    groups:
      - sudo
    add_ssh_keys: true
  - name: nelson
    password_prehashed: "{{ secret_nelson_password_prehashed }}"
    shell: /usr/bin/zsh
    groups:
      - sudo
    add_ssh_keys: true

# geerlingguy.security role variables
# https://galaxy.ansible.com/geerlingguy/security
security_ssh_port: 22
security_ssh_password_authentication: "no"
security_ssh_permit_root_login: "no"
security_ssh_usedns: "no"
security_ssh_permit_empty_password: "no"
security_ssh_challenge_response_auth: "no"
security_ssh_gss_api_authentication: "no"
security_ssh_x11_forwarding: "no"
security_sshd_state: started
security_ssh_restart_handler_state: restarted
security_ssh_allowed_users: ["{{ default_user }}"]
security_ssh_allowed_groups: []

security_sudoers_passwordless: []
security_sudoers_passworded: ["{{ default_user }}"]

security_autoupdate_enabled: true
security_autoupdate_blacklist: []

# Autoupdate mail settings used on Debian/Ubuntu only.
security_autoupdate_reboot: true
security_autoupdate_reboot_time: "03:00"
security_autoupdate_mail_to: "{{ default_user_email }}"
security_autoupdate_mail_on_error: true

security_fail2ban_enabled: true
security_fail2ban_custom_configuration_template: "jail.local.j2"
