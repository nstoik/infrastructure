---
# group_vars for the proxmox_vms group
ansible_become_password: "{{ secret_become_pass }}"

base_users:
  - name: "{{ default_user }}"
    password_prehashed: "{{ secret_user_password_prehashed }}"
    shell: /usr/bin/zsh
    groups:
      - sudo
    add_ssh_keys: true
    dotfiles:
      install: true

base_additional_packages:
  - "qemu-guest-agent"
  - prometheus-node-exporter

base_additional_services:
  - name: "qemu-guest-agent.service"
    state: "started"
    enabled: true
  - name: "openipmi.service"
    state: "stopped"
    enabled: false
